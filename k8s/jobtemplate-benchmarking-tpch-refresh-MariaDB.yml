apiVersion: batch/v1
kind: Job
metadata:
  labels: {app: bexhoma, component: benchmarker, configuration: default, experiment: default, client: default}
  name: bexhoma-benchmarker
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels: {app: bexhoma, component: benchmarker, configuration: default, experiment: default, client: default}
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: dockerhub
      nodeSelector:
      tolerations:
      initContainers:
      - name: datagenerator
        image: bexhoma/generator_tpch_refresh:BEXHOMA_PACKAGE_VERSION
        imagePullPolicy: Always
        env:
        - {name: BEXHOMA_HOST, value: 'bexhoma-sut-mariadb-1234567890'}
        - {name: BEXHOMA_PORT, value: '9091'}
        - {name: BEXHOMA_CONNECTION, value: 'mariadb'}
        - {name: BEXHOMA_EXPERIMENT, value: '1234567890'}
        - {name: SF, value: '100'}
        - {name: TPCH_REFRESH_STREAMS, value: '1'}
        - {name: TPCH_REFRESH_STREAM_OFFSET, value: '0'}
        - {name: STORE_RAW_DATA, value: '1'}
        resources:
        volumeMounts:
        - {mountPath: /data, name: benchmark-data-volume}
      containers:
      - name: dbmsbenchmarker
        image: bexhoma/loader_tpch_refresh_mariadb:BEXHOMA_PACKAGE_VERSION
        imagePullPolicy: Always
        env:
        - {name: BEXHOMA_HOST, value: 'bexhoma-sut-mariadb-1234567890'}
        - {name: BEXHOMA_PORT, value: '9091'}
        - {name: BEXHOMA_USER, value: 'root'}
        - {name: BEXHOMA_PASSWORD, value: 'root'}
        - {name: BEXHOMA_VOLUME, value: 'tpch'}
        - {name: BEXHOMA_CONNECTION, value: 'mariadb'}
        - {name: BEXHOMA_EXPERIMENT, value: '1234567890'}
        - {name: BEXHOMA_CLIENT, value: '1'}
        - {name: BEXHOMA_BENCHMARK_RUN, value: '2'}
        - {name: BEXHOMA_EXPERIMENT_RUN, value: '1'}
        - {name: SF, value: '100'}
        - {name: TPCH_REFRESH_STREAMS, value: '1'}
        - {name: TPCH_REFRESH_STREAM_OFFSET, value: '0'}
        - {name: STORE_RAW_DATA, value: '1'}
        resources:
        volumeMounts:
        - {mountPath: /data, name: benchmark-data-volume}
      restartPolicy: Never
      volumes:
      - name: benchmark-data-volume
        persistentVolumeClaim: {claimName: bexhoma-data}
