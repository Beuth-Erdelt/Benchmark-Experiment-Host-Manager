apiVersion: v1
kind: Service
metadata:
  labels: {app: bexhoma, component: sut, configuration: default, experiment: default}
  name: bexhoma-service
spec:
  ports:
  - {port: 9091, protocol: TCP, name: port-dbms, targetPort: 4000}
  - {port: 9500, protocol: TCP, name: port-web, targetPort: 9500}
  selector: {app: bexhoma, component: sut, configuration: default, experiment: default}
---
apiVersion: v1
kind: Service
metadata:
  name: bexhoma-pd
  labels: {app: bexhoma, component: pd, configuration: default, experiment: default}
spec:
  ports:
  - {port: 2379, protocol: TCP, name: port-dbms, targetPort: 2379}
  - {port: 2380, protocol: TCP, name: port-web, targetPort: 2380}
  clusterIP: None
  publishNotReadyAddresses: true
  selector: {app: bexhoma, component: pd, configuration: default, experiment: default}
---
apiVersion: v1
kind: Service
metadata:
  name: bexhoma-tikv
  labels: {app: bexhoma, component: tikv, configuration: default, experiment: default}
spec:
  ports:
  - {port: 20160, protocol: TCP, name: port-dbms, targetPort: 20160}
  clusterIP: None
  publishNotReadyAddresses: true
  selector: {app: bexhoma, component: tikv, configuration: default, experiment: default}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bexhoma-pd
  labels: {app: bexhoma, component: pd, configuration: default, experiment: default}
spec:
  serviceName: bexhoma-pd
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {app: bexhoma, component: pd, configuration: default, experiment: default}
  template:
    metadata:
      labels: {app: bexhoma, component: pd, configuration: default, experiment: default}
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: pd-init
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          set -ex
          DATA_DIR=/var/lib/pd
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          SVC=${BEXHOMA_PD_SERVICE}
          PREFIX=$(echo $POD_NAME | sed 's/-[0-9]*$//')

          INITIAL_CLUSTER="${PREFIX}-0=http://${PREFIX}-0.${SVC}.${NS}.svc.cluster.local:2380,${PREFIX}-1=http://${PREFIX}-1.${SVC}.${NS}.svc.cluster.local:2380,${PREFIX}-2=http://${PREFIX}-2.${SVC}.${NS}.svc.cluster.local:2380"

          if [ -f "${DATA_DIR}/member/snap/db" ]; then
            echo "Snapshot found - clearing WAL and restarting from snapshot"
            rm -rf ${DATA_DIR}/member/wal
            touch /pd-args/extra-args
          else
            echo "No snapshot - bootstrapping fresh"
            rm -rf ${DATA_DIR}/member
            printf '%s' "--initial-cluster=${INITIAL_CLUSTER}" > /pd-args/extra-args
          fi

          cat /pd-args/extra-args
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: BEXHOMA_PD_SERVICE
          value: bexhoma-pd
        volumeMounts:
        - name: bxw
          mountPath: /var/lib/pd
        - name: pd-args
          mountPath: /pd-args

      containers:
      - name: dbms
        image: pingcap/pd:v7.1.0
        command:
        - /bin/sh
        - -c
        - |
          set -ex
          EXTRA=$(cat /pd-args/extra-args)
          exec /pd-server \
            --name=${POD_NAME} \
            --data-dir=/var/lib/pd \
            --client-urls=http://0.0.0.0:2379 \
            --peer-urls=http://0.0.0.0:2380 \
            --advertise-client-urls=http://${POD_NAME}.${BEXHOMA_PD_SERVICE}.${NAMESPACE}.svc.cluster.local:2379 \
            --advertise-peer-urls=http://${POD_NAME}.${BEXHOMA_PD_SERVICE}.${NAMESPACE}.svc.cluster.local:2380 \
            ${EXTRA}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BEXHOMA_PD_SERVICE
          value: bexhoma-pd
        lifecycle:
          preStop:
            exec:
              # Transfer leadership away before shutdown so the cluster
              # stays available while this pod terminates
              command:
              - /bin/sh
              - -c
              - |
                PD_ADDR="http://127.0.0.1:2379"
                echo "Transferring PD leadership before shutdown..."
                curl -s -X POST "${PD_ADDR}/pd/api/v1/leader/resign" || true
                sleep 5
        readinessProbe:
          httpGet:
            path: /pd/health
            port: 2379
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /pd/health
            port: 2379
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        ports:
        - {containerPort: 2379, name: client}
        - {containerPort: 2380, name: peer}
        volumeMounts:
        - name: bxw
          mountPath: /var/lib/pd
        - name: pd-args
          mountPath: /pd-args

      volumes:
      - name: pd-args
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: bxw
      labels: {app: bexhoma, component: pd, configuration: default, experiment: default}
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bexhoma-tikv
  labels: {app: bexhoma, component: tikv, configuration: default, experiment: default}
spec:
  serviceName: bexhoma-tikv
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {app: bexhoma, component: tikv, configuration: default, experiment: default}
  template:
    metadata:
      labels: {app: bexhoma, component: tikv, configuration: default, experiment: default}
    spec:
      terminationGracePeriodSeconds: 120
      containers:
      - name: dbms
        image: pingcap/tikv:v7.1.0
        args:
        - --addr=0.0.0.0:20160
        - --advertise-addr=$(POD_NAME).$(BEXHOMA_TIKV_SERVICE).$(NAMESPACE).svc.cluster.local:20160
        - --status-addr=0.0.0.0:20180
        - --pd=$(BEXHOMA_PD_LIST)
        - --data-dir=/var/lib/tikv
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BEXHOMA_TIKV_SERVICE
          value: bexhoma-tikv
        lifecycle:
          preStop:
            exec:
              # Give TiKV time to flush and let PD re-schedule regions
              # away from this store before the process is killed
              command:
              - /bin/sh
              - -c
              - |
                echo "TiKV preStop: sleeping to allow region re-scheduling..."
                sleep 20
        readinessProbe:
          httpGet:
            path: /metrics
            port: 20180
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /metrics
            port: 20180
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        resources:
          limits:   {cpu: 16, memory: 64Gi}
          requests: {cpu: 16, memory: 64Gi}
        ports:
        - {containerPort: 20160, name: tikv}
        - {containerPort: 20180, name: metrics}
        volumeMounts:
        - name: bxw
          mountPath: /var/lib/tikv

  volumeClaimTemplates:
  - metadata:
      name: bxw
      labels: {app: bexhoma, component: tikv, configuration: default, experiment: default}
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
      storageClassName: shared
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels: {app: bexhoma, component: sut, configuration: default, experiment: default}
  name: bexhoma-deployment-tidb
spec:
  replicas: 1
  selector:
    matchLabels: {app: bexhoma, component: sut, configuration: default, experiment: default}
  template:
    metadata:
      labels: {app: bexhoma, component: sut, configuration: default, experiment: default}
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      imagePullSecrets:
      - {name: dockerhub}
      containers:
      - name: dbms
        image: pingcap/tidb:v7.1.0
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -ex
          yum install -y mysql --nogpgcheck
          echo "Waiting for TiKV store to be Up..."
          until curl -sf http://${BEXHOMA_PD_NAME}-0.${BEXHOMA_PD_SERVICE}.${NAMESPACE}.svc.cluster.local:2379/pd/api/v1/stores | grep -qE '"state_name":\s*"Up"'; do
            echo "No TiKV Up yet, sleeping 5s..."
            sleep 5
          done
          echo "TiKV ready. Starting TiDB..."
          exec /tidb-server --store=tikv --status=9500 --path=${BEXHOMA_PD_LIST}
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BEXHOMA_PD_NAME
          value: bexhoma-pd
        - name: BEXHOMA_PD_SERVICE
          value: bexhoma-pd
        - name: BEXHOMA_PD_LIST
          value: bexhoma-pd-0.bexhoma-pd.$(NAMESPACE).svc.cluster.local:2379,bexhoma-pd-1.bexhoma-pd.$(NAMESPACE).svc.cluster.local:2379,bexhoma-pd-2.bexhoma-pd.$(NAMESPACE).svc.cluster.local:2379
        lifecycle:
          preStop:
            exec:
              # Let in-flight queries drain before the process exits
              command: ["/bin/sh", "-c", "sleep 10"]
        readinessProbe:
          httpGet:
            path: /status
            port: 9500
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /status
            port: 9500
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        ports:
        - {containerPort: 4000, name: mysql}
        - {containerPort: 9500, name: status}
        resources:
          limits:   {cpu: 100m, memory: 1Gi}
          requests: {cpu: 100m, memory: 16Gi}