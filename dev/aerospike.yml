apiVersion: v1
kind: Service
metadata:
  name: aerospike
  labels:
    app: aerospike
spec:
  clusterIP: None
  selector:
    app: aerospike
  ports:
    - name: service
      port: 3000
    - name: heartbeat
      port: 3002
    - name: fabric
      port: 3001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aerospike
  labels:
    app: aerospike
spec:
  serviceName: aerospike
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: aerospike
  template:
    metadata:
      labels:
        app: aerospike
    spec:
      terminationGracePeriodSeconds: 120
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: aerospike
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: aerospike
          image: aerospike/aerospike-server:latest
          ports:
            - containerPort: 3000
            - containerPort: 3001
            - containerPort: 3002
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /bin/bash
            - -c
            - |
              cat <<EOF > /etc/aerospike/aerospike.conf
              service {
                proto-fd-max 15000
              }

              network {
                service {
                  address any
                  port 3000
                }

                heartbeat {
                  mode mesh
                  port 3002
                  interval 150
                  timeout 10

                  mesh-seed-address-port aerospike-0.aerospike 3002
                  mesh-seed-address-port aerospike-1.aerospike 3002
                  mesh-seed-address-port aerospike-2.aerospike 3002
                }

                fabric {
                  port 3001
                }
              }

              namespace test {
                replication-factor 2

                storage-engine device {
                  file /opt/aerospike/data/test.dat
                  filesize 10G
                }
              }
              EOF

              exec asd --foreground --config-file /etc/aerospike/aerospike.conf

          volumeMounts:
            - name: data
              mountPath: /opt/aerospike/data
          readinessProbe:
            exec:
              command: ["bash", "-c", "asinfo -v status | grep -q 'cluster_size=3'"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: aerospike
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi